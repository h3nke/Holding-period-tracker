<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holding Period Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="authView" class="flex-1 flex items-center justify-center p-4 hidden fade-in">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-md">
            <div class="flex justify-center mb-6">
                <div class="bg-indigo-50 p-3 rounded-xl"><i data-lucide="line-chart" class="text-indigo-600 w-8 h-8"></i></div>
            </div>
            <h1 class="text-2xl font-semibold text-center mb-2">Välkommen tillbaka</h1>
            <p class="text-slate-500 text-center mb-8 text-sm">Logga in för att se dina innehav</p>
            
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">E-post</label>
                    <input type="email" id="emailInput" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Lösenord</label>
                    <input type="password" id="passwordInput" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div id="authError" class="text-red-500 text-sm hidden"></div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" id="loginBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition-colors flex justify-center items-center h-10">
                        <span id="loginText">Logga in</span>
                        <div id="loginSpinner" class="spinner hidden"></div>
                    </button>
                    <button type="button" id="registerBtn" class="flex-1 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 py-2 rounded-lg font-medium transition-colors">Skapa konto</button>
                </div>
            </form>
        </div>
    </div>

    <div id="dashboardView" class="hidden flex-1 flex flex-col">
        <nav class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-50 p-2 rounded-lg"><i data-lucide="pie-chart" class="text-indigo-600 w-5 h-5"></i></div>
                <span class="font-semibold text-lg tracking-tight">HoldingTracker</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="userEmail" class="text-sm text-slate-500 hidden sm:block"></span>
                <button id="logoutBtn" class="text-slate-500 hover:text-slate-800 transition-colors p-2 rounded-md hover:bg-slate-50">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </nav>

        <main class="flex-1 max-w-5xl w-full mx-auto p-4 sm:p-6 lg:p-8">
            
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-8 flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-500 mb-1">Genomsnittlig Innehavstid</p>
                    <h2 id="avgHoldTime" class="text-3xl font-semibold text-slate-800">--</h2>
                </div>
                <div class="bg-indigo-50 p-4 rounded-full hidden sm:block">
                    <i data-lucide="clock" class="text-indigo-600 w-8 h-8"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 sticky top-24">
                        <h3 class="font-semibold text-lg mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-indigo-500"></i> Nytt Innehav</h3>
                        <form id="addHoldingForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Aktie/Tillgång</label>
                                <input type="text" id="stockName" required placeholder="t.ex. Apple Inc." class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Köpt Datum</label>
                                <input type="date" id="purchaseDate" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>
                            <button type="submit" id="addBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-lg font-medium transition-colors flex justify-center items-center h-10">
                                <span id="addText">Lägg till</span>
                                <div id="addSpinner" class="spinner hidden"></div>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <h3 class="font-semibold text-lg">Dina Innehav</h3>
                            <button id="refreshBtn" class="text-slate-400 hover:text-indigo-600 transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                        </div>
                        
                        <div class="hidden md:block overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-white border-b border-slate-100 text-sm text-slate-500">
                                        <th class="px-6 py-3 font-medium cursor-pointer hover:text-slate-800 transition-colors" onclick="app.sortData('stock_name')">Namn <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                        <th class="px-6 py-3 font-medium cursor-pointer hover:text-slate-800 transition-colors" onclick="app.sortData('purchase_date')">Köpt Datum <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                        <th class="px-6 py-3 font-medium cursor-pointer hover:text-slate-800 transition-colors" onclick="app.sortData('days_held')">Innehavstid <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                        <th class="px-6 py-3 font-medium text-right">Åtgärd</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody" class="divide-y divide-slate-50">
                                    </tbody>
                            </table>
                        </div>

                        <div id="mobileCards" class="md:hidden divide-y divide-slate-100">
                            </div>

                        <div id="dataStateMsg" class="p-8 text-center text-slate-500 text-sm">
                            Laddar data...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURATION - KLISTRA IN DINA NYCKLAR HÄR
        // ==========================================
        const SUPABASE_URL = 'https://socixgiusmrnejuyeyha.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvY2l4Z2l1c21ybmVqdXlleWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3MjY0MjUsImV4cCI6MjA4NDMwMjQyNX0.XZ4pQcji0mk8A5-FmBvge_ENg4mGd5EU_c8pKWX5oZY';
        
        // Initiera Supabase
        const supabaseUrl = SUPABASE_URL;
        const supabaseKey = SUPABASE_ANON_KEY;
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // 2. APPLIKATIONSLOGIK (STATE & METODER)
        // ==========================================
        const app = {
            user: null,
            holdings: [],
            sortCol: 'purchase_date',
            sortAsc: true,

            async init() {
                lucide.createIcons();
                document.getElementById('purchaseDate').max = new Date().toISOString().split("T")[0]; // Kan ej köpa i framtiden
                
                // Event Listeners
                document.getElementById('authForm').addEventListener('submit', this.handleLogin.bind(this));
                document.getElementById('registerBtn').addEventListener('click', this.handleRegister.bind(this));
                document.getElementById('logoutBtn').addEventListener('click', this.handleLogout.bind(this));
                document.getElementById('addHoldingForm').addEventListener('submit', this.handleAdd.bind(this));
                document.getElementById('refreshBtn').addEventListener('click', () => this.fetchHoldings());

                // Kolla session
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    this.user = session.user;
                    this.showDashboard();
                } else {
                    this.showAuth();
                }

                // Lyssna på Auth-förändringar
                supabaseClient.auth.onAuthStateChange((_event, session) => {
                    if (session) {
                        this.user = session.user;
                        this.showDashboard();
                    } else {
                        this.user = null;
                        this.showAuth();
                    }
                });
            },

            // --- UI & Navigering ---
            showAuth() {
                document.getElementById('dashboardView').classList.add('hidden');
                document.getElementById('authView').classList.remove('hidden');
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
            },

            showDashboard() {
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                document.getElementById('userEmail').textContent = this.user.email;
                this.fetchHoldings();
            },

            // --- Autentisering ---
            async handleLogin(e) {
                e.preventDefault();
                this.setLoading('loginBtn', 'loginText', 'loginSpinner', true);
                const email = document.getElementById('emailInput').value;
                const password = document.getElementById('passwordInput').value;
                const errorEl = document.getElementById('authError');
                
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                
                if (error) {
                    errorEl.textContent = error.message;
                    errorEl.classList.remove('hidden');
                } else {
                    errorEl.classList.add('hidden');
                }
                this.setLoading('loginBtn', 'loginText', 'loginSpinner', false);
            },

            async handleRegister() {
                const email = document.getElementById('emailInput').value;
                const password = document.getElementById('passwordInput').value;
                const errorEl = document.getElementById('authError');
                
                if(!email || !password) {
                    errorEl.textContent = "Fyll i både e-post och lösenord för att registrera dig.";
                    errorEl.classList.remove('hidden');
                    return;
                }

                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    errorEl.textContent = error.message;
                    errorEl.classList.remove('hidden');
                } else {
                    errorEl.textContent = "Konto skapat! Kolla din e-post eller logga in direkt.";
                    errorEl.classList.remove('hidden');
                    errorEl.classList.replace('text-red-500', 'text-green-600');
                }
            },

            async handleLogout() {
                await supabaseClient.auth.signOut();
            },

            // --- Databasoperationer ---
            async fetchHoldings() {
                document.getElementById('dataStateMsg').innerHTML = '<div class="spinner border-slate-300 border-t-indigo-600 mx-auto mb-2"></div> Laddar...';
                document.getElementById('dataStateMsg').classList.remove('hidden');
                document.getElementById('tableBody').innerHTML = '';
                document.getElementById('mobileCards').innerHTML = '';

                const { data, error } = await supabaseClient
                    .from('holdings')
                    .select('*')
                    .order(this.sortCol, { ascending: this.sortAsc });

                if (error) {
                    console.error(error);
                    document.getElementById('dataStateMsg').textContent = 'Kunde inte hämta data.';
                    return;
                }

                // Beräkna metadata (dagar hållna) för sortering och rendering
                this.holdings = data.map(item => {
                    const duration = this.calcDuration(item.purchase_date);
                    return { ...item, durationStr: duration.str, days_held: duration.totalDays };
                });

                this.renderData();
            },

            async handleAdd(e) {
                e.preventDefault();
                this.setLoading('addBtn', 'addText', 'addSpinner', true);
                
                const stock_name = document.getElementById('stockName').value;
                const purchase_date = document.getElementById('purchaseDate').value;

                const { error } = await supabaseClient
                    .from('holdings')
                    .insert([{ stock_name, purchase_date, user_id: this.user.id }]);

                this.setLoading('addBtn', 'addText', 'addSpinner', false);

                if (error) {
                    alert('Ett fel uppstod: ' + error.message);
                } else {
                    document.getElementById('addHoldingForm').reset();
                    this.fetchHoldings();
                }
            },

            async handleDelete(id) {
                if(!confirm('Är du säker på att du vill radera innehavet?')) return;
                
                const { error } = await supabaseClient
                    .from('holdings')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Kunde inte radera: ' + error.message);
                } else {
                    this.fetchHoldings();
                }
            },

            // --- Beräkningar ---
            calcDuration(dateStr) {
                const start = new Date(dateStr);
                const end = new Date();
                
                // Total dagar för sortering/medelvärde
                const diffTime = Math.abs(end - start);
                const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                let years = end.getFullYear() - start.getFullYear();
                let months = end.getMonth() - start.getMonth();
                let days = end.getDate() - start.getDate();

                if (days < 0) {
                    months--;
                    const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
                    days += prevMonth.getDate();
                }
                if (months < 0) {
                    years--;
                    months += 12;
                }

                if (years < 0) return { str: "0 dagar", totalDays: 0 };

                let parts = [];
                if (years > 0) parts.push(`${years} år`);
                if (months > 0) parts.push(`${months} mån`);
                if (days > 0 || parts.length === 0) parts.push(`${days} dgr`);

                return { str: parts.join(', '), totalDays };
            },

            calcAverage() {
                if(this.holdings.length === 0) return "--";
                const sumDays = this.holdings.reduce((sum, h) => sum + h.days_held, 0);
                const avgDays = Math.round(sumDays / this.holdings.length);
                
                const years = Math.floor(avgDays / 365);
                const months = Math.floor((avgDays % 365) / 30);
                const days = (avgDays % 365) % 30;

                let parts = [];
                if (years > 0) parts.push(`${years} år`);
                if (months > 0) parts.push(`${months} mån`);
                if (days > 0 || parts.length === 0) parts.push(`${days} dgr`);
                return parts.join(', ');
            },

            // --- Rendering & Utility ---
            sortData(col) {
                if (this.sortCol === col) {
                    this.sortAsc = !this.sortAsc;
                } else {
                    this.sortCol = col;
                    this.sortAsc = true;
                }
                
                // Sortera array i minnet för snabb UI-uppdatering
                this.holdings.sort((a, b) => {
                    let valA = a[col];
                    let valB = b[col];
                    if(col === 'stock_name') {
                        valA = valA.toLowerCase(); valB = valB.toLowerCase();
                    }
                    if (valA < valB) return this.sortAsc ? -1 : 1;
                    if (valA > valB) return this.sortAsc ? 1 : -1;
                    return 0;
                });
                this.renderData();
            },

            renderData() {
                const tbody = document.getElementById('tableBody');
                const mobileDiv = document.getElementById('mobileCards');
                const msg = document.getElementById('dataStateMsg');
                
                // Uppdatera snitt
                document.getElementById('avgHoldTime').textContent = this.calcAverage();

                if (this.holdings.length === 0) {
                    msg.textContent = 'Inga innehav tillagda ännu.';
                    msg.classList.remove('hidden');
                    return;
                }
                msg.classList.add('hidden');

                let trHtml = '';
                let cardHtml = '';

                this.holdings.forEach(h => {
                    // Desktop Row
                    trHtml += `
                        <tr class="hover:bg-slate-50 transition-colors group">
                            <td class="px-6 py-4 font-medium text-slate-800">${this.escapeHTML(h.stock_name)}</td>
                            <td class="px-6 py-4 text-slate-500">${h.purchase_date}</td>
                            <td class="px-6 py-4">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">
                                    ${h.durationStr}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="app.handleDelete('${h.id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </td>
                        </tr>
                    `;

                    // Mobile Card
                    cardHtml += `
                        <div class="p-4 flex flex-col gap-2">
                            <div class="flex justify-between items-start">
                                <span class="font-medium text-slate-800">${this.escapeHTML(h.stock_name)}</span>
                                <button onclick="app.handleDelete('${h.id}')" class="text-slate-300 hover:text-red-500 p-1">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-slate-500"><i data-lucide="calendar" class="inline w-3 h-3 mr-1"></i>${h.purchase_date}</span>
                                <span class="font-medium text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md text-xs">${h.durationStr}</span>
                            </div>
                        </div>
                    `;
                });

                tbody.innerHTML = trHtml;
                mobileDiv.innerHTML = cardHtml;
                lucide.createIcons(); // Ladda om ikoner för ny renderad HTML
            },

            setLoading(btnId, textId, spinnerId, isLoading) {
                document.getElementById(textId).style.display = isLoading ? 'none' : 'block';
                document.getElementById(spinnerId).style.display = isLoading ? 'block' : 'none';
                document.getElementById(btnId).disabled = isLoading;
            },

            escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                    }[tag])
                );
            }
        };

        // Starta appen när DOM laddat
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
